services:
  php:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: php
  redis:
    image: redis:4.0.6
    container_name: redis
  memcached:
    image: memcached:latest
    container_name: memcached
    ports:
      - "11211:11211"
  composer:
    image: composer:latest
    volumes:
      - .:/app
    working_dir: /app
    command: install
